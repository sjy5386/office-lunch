services:
  app:
    image: python:3.14-alpine
    environment:
      - MENU_FREQUENCY=${MENU_FREQUENCY}
      - RESTAURANT=${RESTAURANT}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_CHANNEL_ID=${SLACK_CHANNEL_ID}
    volumes:
      - .:/app
    working_dir: /app
    entrypoint: [ "sh", "-c", "pip install -r requirements.txt && python main.py" ]
